version: "3.8"

services:
  airflow:
    image: apache/airflow:2.8.1
    container_name: airflow
    restart: unless-stopped
    user: "50000:0"
    group_add:
      - "106"

    environment:
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////opt/airflow/data/airflow.db

    volumes:
      # Persist Airflow database and password
      - ./data:/opt/airflow/data

      # Your DAGs (Python files)
      - ./dags:/opt/airflow/dags

      # Your JSON configs
      - ./config:/opt/airflow/config

      # Required so DockerOperator can launch containers
      - /var/run/docker.sock:/var/run/docker.sock

    expose:
      - "8080"
    command: airflow standalone

  nginx:
    image: nginx:1.25
    container_name: nginx-airflow
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./localhost.crt:/etc/nginx/ssl/localhost.crt:ro
      - ./localhost.key:/etc/nginx/ssl/localhost.key:ro
      - ./nginx.htpasswd:/etc/nginx/nginx.htpasswd:ro
    depends_on:
      - airflow
